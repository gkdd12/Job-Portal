<!DOCTYPE html>
<html>
    <head>
        <title>The Registration Page</title>
        <link rel="icon" type="image/png" href="images/logo.png">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="stylesheet" href="css/responsive.css">
    </head>
    <body>
        <nav>
        <a href="login.html"> Login </a>
        <a href="jobs.html"> Job listing</a>
        <a href="companies.html"> View Companies </a>
        <a href="index.html">Home</a>
        </nav>
        <div class="container">
        <h1>Registration</h1>
        <form action="login.html">
            <fieldset>
                <legend>Personal Details</legend>
                <label for="name">Name:</label> <input type="text"><br>
                <label for="phoneNumber">Phone Number:</label> <input type="tel"><br>
                <label for="nationality">Nationality: </label><input type="text"><br>
                <label for="gmail">Gmail:</label><input type="email">
            </fieldset>
            <fieldset>
                <label for="userID">UserID: </label><input type="text"><br>
                <label for="password">Password: </label><input type="password"><br>
                <label for="confirmPassword">Confirm Password: </label><input type="password">
            </fieldset>
            <button type="submit" onclick="registerSubmit(event)">Submit</button>
        </form>
        </div>
        <script src="js/main.js"></script>
    </body>
</html>
